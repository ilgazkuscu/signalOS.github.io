<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SignalOS Whale Detector</title>
  <style>
    /* Root variables for dark and light themes */
    :root {
      --bg: #08090f;
      --text: #ddd;
      --card-bg: #10121c;
      --border: #1a1e2e;
      --accent: #6c5ce7;
      --positive: #2ecc71;
      --negative: #e74c3c;
      --warning: #f7b731;
      --muted: #555;
    }
    body.light {
      --bg: #f7f8fa;
      --text: #222;
      --card-bg: #ffffff;
      --border: #e5e7eb;
      --accent: #4b4ecd;
      --positive: #28a745;
      --negative: #dc3545;
      --warning: #f0ad4e;
      --muted: #666;
    }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen,
        Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px;
      background: var(--card-bg);
      border-bottom: 1px solid var(--border);
    }
    header h1 {
      margin: 0;
      font-size: 20px;
    }
    .btn {
      padding: 6px 12px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--card-bg);
      color: var(--text);
      cursor: pointer;
      font-size: 14px;
      transition: background 0.2s;
    }
    .btn:hover {
      background: var(--border);
    }
    main {
      padding: 16px;
    }
    .section {
      margin-bottom: 24px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 16px;
    }
    .section h2 {
      margin-top: 0;
      font-size: 16px;
    }
    #trending-list, #search-results, #tracked-list, #whale-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .market-card {
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 10px;
      background: var(--bg);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }
    .market-card span {
      flex: 1 1 auto;
      font-size: 13px;
    }
    .market-card button {
      padding: 4px 8px;
      font-size: 12px;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: var(--accent);
      color: #fff;
      cursor: pointer;
    }
    .market-card button.remove {
      background: var(--negative);
    }
    .small-chart {
      width: 100%;
      height: 60px;
    }
    #error {
      white-space: pre-wrap;
      color: var(--negative);
      font-size: 12px;
      margin: 8px 0;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--bg);
      color: var(--text);
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <header>
    <h1>SignalOS Whale Detector</h1>
    <button id="theme-toggle" class="btn">Toggle Theme</button>
  </header>
  <main>
    <div class="section" id="insights">
      <h2>Market Insights</h2>
      <div id="trending-list"></div>
    </div>
    <div class="section" id="search">
      <h2>Search Markets</h2>
      <input type="text" id="search-input" placeholder="Search for a market..." />
      <div id="search-results"></div>
    </div>
    <div class="section" id="tracked">
      <h2>Tracked Markets</h2>
      <div id="tracked-list"></div>
    </div>
    <div class="section" id="whales">
      <h2>Whale Feed</h2>
      <div id="whale-list"></div>
    </div>
    <div id="error"></div>
  </main>
<script>
(() => {
  const PROXY = "https://corsproxy.io/?";
  const GAMMA = "https://gamma-api.polymarket.com";
  const CLOB = "https://clob.polymarket.com";

  const state = {
    trending: [],
    searchResults: [],
    tracked: [],
    whales: [],
    theme: localStorage.getItem('signalos-theme') || 'dark',
  };

  // Predefined markets used when API requests fail. These are well‑known
  // Polymarket questions with substantial traded volume (approximated). When
  // the gamma API cannot be reached or returns no data, the insights section
  // will fall back to these entries so the user always sees some markets.
  // Yes/no token ids are intentionally left blank to avoid price fetches
  // failing on unsupported CLOB endpoints; volume values are used for whale
  // thresholds.
  const FALLBACK_MARKETS = [
    {
      id: "531202",
      question: "BitBoy convicted?",
      slug: "bitboy-convicted",
      yesToken: "",
      noToken: "",
      volume: 284224.01519699756,
      liquidity: 15947.85996
    },
    {
      id: "540819",
      question: "Will Jesus Christ return before GTA VI?",
      slug: "will-jesus-christ-return-before-gta-vi-665",
      yesToken: "",
      noToken: "",
      volume: 10347413.546851065,
      liquidity: 685097.9202
    },
    {
      id: "540818",
      question: "What will happen before GTA VI?",
      slug: "what-will-happen-before-gta-vi",
      yesToken: "",
      noToken: "",
      volume: 19747925.1062258,
      liquidity: 1389259.88938
    }
  ];

  // Apply initial theme
  if (state.theme === 'light') document.body.classList.add('light');

  // Theme toggle handler
  document.getElementById('theme-toggle').addEventListener('click', () => {
    state.theme = state.theme === 'dark' ? 'light' : 'dark';
    document.body.classList.toggle('light');
    localStorage.setItem('signalos-theme', state.theme);
  });

  // Elements
  const trendingListEl = document.getElementById('trending-list');
  const searchInputEl = document.getElementById('search-input');
  const searchResultsEl = document.getElementById('search-results');
  const trackedListEl = document.getElementById('tracked-list');
  const whaleListEl = document.getElementById('whale-list');
  const errorEl = document.getElementById('error');

  // Helper: fetch JSON with timeout
  async function fetchJson(url, timeout = 8000) {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), timeout);
    try {
      let res = await fetch(url, { signal: controller.signal }).catch(() => null);
      if (!res || !res.ok) {
        // fallback to proxy
        res = await fetch(PROXY + encodeURIComponent(url), { signal: controller.signal });
      }
      clearTimeout(timer);
      return await res.json();
    } catch (e) {
      clearTimeout(timer);
      throw e;
    }
  }

  // Fetch trending markets
  // Pull a set of open markets from the Polymarket Gamma API and
  // select the largest markets by traded volume.  Markets with
  // volume >= $50k are considered significant; if fewer than three
  // meet the threshold then the top three by volume are used.  This
  // replaces the previously hard‑coded Iran examples and ensures the
  // insights section always displays real, liquid markets.
  async function loadTrending() {
    try {
      const data = await fetchJson(`${GAMMA}/markets?closed=false&limit=50`);
      if (!Array.isArray(data)) {
        // If the API response isn't an array (e.g. error object), fall back to
        // predefined markets rather than leaving the list empty.  This ensures
        // the insights section always has content when the gamma API returns
        // unexpected data structures.
        state.trending = FALLBACK_MARKETS.slice(0, 3);
        renderTrending();
        return;
      }
      const markets = data.map((m) => ({
        id: m.conditionId || m.id,
        question: m.question || m.title || 'Unknown',
        slug: m.slug || '',
        yesToken: parseClobTokens(m.clobTokenIds, 0),
        noToken: parseClobTokens(m.clobTokenIds, 1),
        volume: parseFloat(m.volume || m.volumeNum || 0),
        liquidity: parseFloat(m.liquidity || m.liquidityNum || 0),
      }));
      // Sort by descending volume
      markets.sort((a, b) => b.volume - a.volume);
      // Filter for markets meeting a $50k volume threshold
      const significant = markets.filter((m) => m.volume >= 50000);
      const selected = (significant.length >= 3 ? significant : markets).slice(0, 3);
      state.trending = selected;
      renderTrending();
    } catch (err) {
      // On error, fall back to predefined markets so users always see something
      state.trending = FALLBACK_MARKETS.slice(0, 3);
      renderTrending();
    }
  }

  // Parse token ids from CLOB array
  function parseClobTokens(raw, idx) {
    if (!raw) return '';
    try {
      const arr = typeof raw === 'string' ? JSON.parse(raw) : raw;
      return Array.isArray(arr) ? arr[idx] || '' : '';
    } catch {
      return '';
    }
  }

  // Fetch price history for token
  async function getPriceHistory(tokenId, fidelity = 60) {
    if (!tokenId) return [];
    try {
      const data = await fetchJson(`${CLOB}/prices-history?market=${tokenId}&interval=max&fidelity=${fidelity}`);
      if (!data || !data.history) return [];
      return data.history.map((p) => ({
        time: p.t * 1000,
        price: Math.round(parseFloat(p.p) * 10000) / 100,
      }));
    } catch {
      return [];
    }
  }

  // Render trending markets
  function renderTrending() {
    trendingListEl.innerHTML = '';
    state.trending.forEach((m) => {
      const div = document.createElement('div');
      div.className = 'market-card';
      const span = document.createElement('span');
      span.textContent = `${m.question}`;
      const btn = document.createElement('button');
      btn.textContent = 'Add';
      btn.onclick = () => addTracked(m);
      div.appendChild(span);
      div.appendChild(btn);
      trendingListEl.appendChild(div);
    });
  }

  // Add to tracked markets
  function addTracked(market) {
    if (state.tracked.find((t) => t.id === market.id)) return;
    state.tracked.push({ ...market });
    saveTracked();
    renderTracked();
  }

  function removeTracked(id) {
    state.tracked = state.tracked.filter((m) => m.id !== id);
    saveTracked();
    renderTracked();
  }

  function saveTracked() {
    localStorage.setItem('signalos-tracked', JSON.stringify(state.tracked));
  }

  function loadTracked() {
    try {
      const arr = JSON.parse(localStorage.getItem('signalos-tracked')) || [];
      state.tracked = arr;
    } catch {
      state.tracked = [];
    }
  }

  // Render tracked markets (with price chart)
  function renderTracked() {
    trackedListEl.innerHTML = '';
    state.tracked.forEach(async (m) => {
      const card = document.createElement('div');
      card.className = 'market-card';
      const span = document.createElement('span');
      span.textContent = m.question;
      const chart = document.createElement('canvas');
      chart.className = 'small-chart';
      const removeBtn = document.createElement('button');
      removeBtn.textContent = 'Remove';
      removeBtn.classList.add('remove');
      removeBtn.onclick = () => removeTracked(m.id);
      card.appendChild(span);
      card.appendChild(chart);
      card.appendChild(removeBtn);
      trackedListEl.appendChild(card);
      const history = await getPriceHistory(m.yesToken);
      drawChart(chart, history);
    });
  }

  // Draw simple line chart on canvas
  function drawChart(canvas, data) {
    const ctx = canvas.getContext('2d');
    const width = canvas.width;
    const height = canvas.height;
    ctx.clearRect(0, 0, width, height);
    if (!data || data.length === 0) {
      ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--muted');
      ctx.fillText('No data', 10, 30);
      return;
    }
    // Normalize data
    const prices = data.map((d) => d.price);
    const times = data.map((d) => d.time);
    const minP = Math.min(...prices);
    const maxP = Math.max(...prices);
    const minT = Math.min(...times);
    const maxT = Math.max(...times);
    const points = data.map((d) => {
      const x = ((d.time - minT) / (maxT - minT)) * width;
      const y = height - ((d.price - minP) / (maxP - minP || 1)) * height;
      return { x, y };
    });
    ctx.beginPath();
    ctx.strokeStyle = getComputedStyle(document.body).getPropertyValue('--accent');
    ctx.lineWidth = 1;
    points.forEach((p, i) => {
      if (i === 0) ctx.moveTo(p.x, p.y);
      else ctx.lineTo(p.x, p.y);
    });
    ctx.stroke();
  }

  // Search markets
  searchInputEl.addEventListener('input', async (e) => {
    const query = e.target.value.trim();
    if (query.length < 2) {
      searchResultsEl.innerHTML = '';
      return;
    }
    try {
      const data = await fetchJson(`${GAMMA}/markets?title=${encodeURIComponent(query)}&closed=false&limit=10`);
      if (!Array.isArray(data)) return;
      state.searchResults = data.map((m) => ({
        id: m.conditionId || m.id,
        question: m.question || m.title || 'Unknown',
        slug: m.slug || '',
        yesToken: parseClobTokens(m.clobTokenIds, 0),
        noToken: parseClobTokens(m.clobTokenIds, 1),
        volume: parseFloat(m.volume || m.volumeNum || 0),
        liquidity: parseFloat(m.liquidity || m.liquidityNum || 0),
      }));
      renderSearchResults();
    } catch {
      errorEl.textContent = 'Error searching markets';
    }
  });

  function renderSearchResults() {
    searchResultsEl.innerHTML = '';
    state.searchResults.forEach((m) => {
      const div = document.createElement('div');
      div.className = 'market-card';
      const span = document.createElement('span');
      span.textContent = m.question;
      const btn = document.createElement('button');
      btn.textContent = 'Add';
      btn.onclick = () => addTracked(m);
      div.appendChild(span);
      div.appendChild(btn);
      searchResultsEl.appendChild(div);
    });
  }

  // Whale feed (fetch large trades periodically)
  async function loadWhales() {
    whaleListEl.innerHTML = '';
    let whaleCount = 0;
    for (const m of state.tracked) {
      try {
        const data = await fetchJson(`${GAMMA}/activity?market=${m.id}&limit=10`);
        if (!Array.isArray(data)) continue;
        data.forEach((t) => {
          const sizeUSD = parseFloat(t.amountUsd || t.sizeUsd || 0);
          // Determine threshold: either 1% of the market's total volume or $50k
          const vol = parseFloat(m.volume || 0);
          const threshold = Math.max(vol * 0.01, 50000);
          if (sizeUSD < threshold) return;
          const row = document.createElement('div');
          row.className = 'market-card';
          const span = document.createElement('span');
          span.textContent = `${m.question}: ${t.side || ''} $${sizeUSD.toFixed(0)}`;
          row.appendChild(span);
          whaleListEl.appendChild(row);
          whaleCount++;
        });
      } catch {
        // ignore errors
      }
    }
    // If no whale trades were added, display a friendly message
    if (whaleCount === 0) {
      const msg = document.createElement('div');
      msg.style.padding = '8px';
      msg.style.fontSize = '13px';
      msg.style.color = getComputedStyle(document.body).getPropertyValue('--muted');
      msg.textContent = 'No whale trades meeting the threshold (>1% of volume or >$50k) yet.';
      whaleListEl.appendChild(msg);
    }
  }

  // Periodically update whales
  setInterval(() => {
    if (state.tracked.length > 0) loadWhales();
  }, 30000);

  // Load tracked markets from localStorage
  loadTracked();
  renderTracked();
  // Load trending markets
  loadTrending();
})();
</script>
</body>
</html>
